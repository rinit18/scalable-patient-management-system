version: '3.8'

services:
  # -------------------------
  # Infrastructure
  # -------------------------

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_KRAFT_MODE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # -------------------------
  # Databases
  # -------------------------

  auth-service-db:
    image: postgres:15
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5001:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  patient-service-db:
    image: postgres:15
    container_name: patient-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5000:5432"
    volumes:
      - patient-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------
  # Microservices
  # -------------------------

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    depends_on:
      auth-service-db:
        condition: service_healthy
    ports:
      - "4005:4005"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: "jdbc:postgresql://auth-db:5432/db"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_SQL_INIT_MODE: "always"

  billing-service:
    build: ./billing-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "4001:4001"
      - "9001:9001"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  patient-service:
    build: ./patient-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      patient-service-db:
        condition: service_healthy
      billing-service:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "4000:4000"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://patient-db:5432/db"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      BILLING_SERVICE_ADDRESS: "billing-service"
      BILLING_SERVICE_GRPC_PORT: "9001"
      SPRING_CACHE_TYPE: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"

  analytics-service:
    build: ./analytics-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "4002:4002"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  api-gateway:
    build: ./api-gateway
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
    ports:
      - "4004:4004"
    environment:
      AUTH_SERVICE_URL: "http://auth-service:4005"

  # -------------------------
  # Monitoring
  # -------------------------

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment: # Add these environment variables
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana

# -------------------------
# Volumes
# -------------------------

volumes:
  kafka-data:
  redis-data:
  auth-db-data:
  patient-db-data:
  prometheus-data:
  grafana-data: